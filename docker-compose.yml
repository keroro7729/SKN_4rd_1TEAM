# WOOK'S CODING - App server orchestration for RDS deployment.
# PostgreSQL은 AWS RDS를 사용하며, 루트 .env의 POSTGRES_HOST를 그대로 따른다.

services:
  chromadb:
    image: chromadb/chroma:0.5.3
    volumes:
      - chromadata:/chroma/chroma
    # 내부 네트워크 전용 (외부 미노출)

  django:
    build: ./django
    env_file: .env
    environment:
      LOG_DIR: /logs   # /app/logs 는 Django 'logs' 앱과 충돌 → /logs 로 분리
    # migrate 결과는 migrate.log 로, gunicorn 실행 로그는 access/error.log 로 남긴다.
    # (migrate 실패 시 '>' 리다이렉트가 exit code 를 보존 → && 체인이 멈춰 원인 확인 가능)
    # ⚠️ YAML folded(>) 는 더 들여쓴 줄의 개행을 보존한다. 각 셸 구문은 반드시
    #    한 물리적 줄에 두고 '&&' 로 끝낼 것(gunicorn 플래그를 다음 줄로 내리면 명령이 끊긴다).
    command: >
      sh -c "mkdir -p /logs/django &&
             python manage.py migrate --no-input > /logs/django/migrate.log 2>&1 &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --access-logfile /logs/django/access.log --error-logfile /logs/django/error.log --capture-output"
    volumes:
      - staticfiles:/app/staticfiles
      - ./volumes/logs:/logs        # 개발/디버깅/AI연구용 로그 (호스트 보존)
      - ./volumes/data:/app/data:ro     # seed 데이터(CSV) 적재용 — 읽기 전용
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=2).read()\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    # 내부 네트워크 전용 (Nginx를 통해서만 노출)

  fastapi:
    build: ./fastapi_app
    env_file: .env
    environment:
      CHROMA_HOST: chromadb
      LOG_DIR: /logs   # /app/logs 는 Django 'logs' 앱과 충돌 → /logs 로 분리
    volumes:
      - ./volumes/logs:/logs        # app.log + ai/research.jsonl (호스트 보존)
    depends_on:
      - chromadb
    # 내부 네트워크 전용 (Django가 http://fastapi:8001 로 호출)

  worker:
    build: ./worker
    env_file: .env
    environment:
      LOG_DIR: /logs   # /app/logs 는 Django 'logs' 앱과 충돌 → /logs 로 분리
    volumes:
      - ./volumes/logs:/logs        # worker/app.log (호스트 보존)

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/staticfiles:ro
    ports:
      - "80:80"
    depends_on:
      django:
        condition: service_healthy

volumes:
  chromadata:
  staticfiles:
