# WOOK'S CODING - Single EC2 orchestration for the current development phase.
# PostgreSQL stays on RDS. The worker runs on this EC2 for now and can be split
# later with docker-compose.worker.yml.

services:
  chromadb:
    image: chromadb/chroma:0.5.3
    volumes:
      - chromadata:/chroma/chroma

  django:
    build: ./django
    env_file: .env
    environment:
      LOG_DIR: /logs
    command: >
      sh -c "mkdir -p /logs/django &&
             python manage.py migrate --no-input > /logs/django/migrate.log 2>&1 &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --access-logfile /logs/django/access.log --error-logfile /logs/django/error.log --capture-output"
    volumes:
      - staticfiles:/app/staticfiles
      - ./volumes/logs:/logs
      - ./volumes/data:/app/data:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=2).read()\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  fastapi:
    build: ./fastapi_app
    env_file: .env
    environment:
      CHROMA_HOST: chromadb
      LOG_DIR: /logs
    volumes:
      - ./volumes/logs:/logs
    depends_on:
      - chromadb

  worker:
    build: ./worker
    env_file: .env
    environment:
      LOG_DIR: /logs
    volumes:
      - ./volumes/logs:/logs
    depends_on:
      django:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/staticfiles:ro
    ports:
      - "80:80"
    depends_on:
      django:
        condition: service_healthy

volumes:
  chromadata:
  staticfiles:
