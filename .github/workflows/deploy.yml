name: Deploy STEP04 Split Servers

on:
  push:
    branches: ["feature/step04-rds-worker"]
  workflow_dispatch:

jobs:
  deploy-app:
    name: Deploy app server
    runs-on: ubuntu-latest

    steps:
      - name: Deploy app stack to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.APP_EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 10m
          script: |
            set -e
            DEPLOY_BRANCH="feature/step04-rds-worker"
            cd /home/ubuntu/apps/wooks-coding
            git fetch origin "$DEPLOY_BRANCH"
            git reset --hard "origin/$DEPLOY_BRANCH"
            test -f .env
            if grep -Eq '^POSTGRES_HOST=postgres$' .env; then
              echo "POSTGRES_HOST must point to the RDS endpoint in production."
              exit 1
            fi
            if docker compose config --services | grep -Eq '^(postgres|worker)$'; then
              echo "App server compose must not run postgres or worker."
              docker compose config --services
              exit 1
            fi
            docker compose up --build -d --remove-orphans
            for i in $(seq 1 30); do
              if docker compose exec -T django python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=5).read()"; then
                break
              fi
              if [ "$i" -eq 30 ]; then
                docker compose logs --tail=100 django
                exit 1
              fi
              sleep 2
            done
            docker compose restart nginx
            docker compose ps
            docker compose exec -T django python manage.py check
            docker compose exec -T django python manage.py bootstrap_postgres --skip-migrate --require-rds
            curl -fsSI http://localhost/health/ >/dev/null

  deploy-worker:
    name: Deploy worker server
    runs-on: ubuntu-latest
    needs: deploy-app

    steps:
      - name: Deploy worker to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WORKER_EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 10m
          script: |
            set -e
            DEPLOY_BRANCH="feature/step04-rds-worker"
            cd /home/ubuntu/apps/wooks-coding
            git fetch origin "$DEPLOY_BRANCH"
            git reset --hard "origin/$DEPLOY_BRANCH"
            test -f .env
            if grep -Eq '^POSTGRES_HOST=postgres$' .env; then
              echo "POSTGRES_HOST must point to the RDS endpoint in production."
              exit 1
            fi
            if [ "$(docker compose -f docker-compose.worker.yml config --services)" != "worker" ]; then
              echo "Worker server compose must run only worker."
              docker compose -f docker-compose.worker.yml config --services
              exit 1
            fi
            docker compose -f docker-compose.worker.yml up --build -d --remove-orphans
            docker compose -f docker-compose.worker.yml ps
            docker compose -f docker-compose.worker.yml logs --tail=80 worker
