# ⚠️ [이력 보존 · 현재 미사용] 개발 서버 초기 CI/CD (GitHub Actions).
#
# 저장소 정리 후, 배포는 다음으로 일원화되었다:
#   - 로컬 통합 실행 : docker-compose.yml
#   - 운영 앱 서버   : compose/main.yml   (deploy/deploy_main.sh)
#   - 운영 워커 서버 : compose/worker.yml (deploy/deploy_worker.sh)
#
# 이 워크플로는 초기 자동 배포 방식의 "이력"으로만 남긴다. 자동 트리거(push) 없이
# 수동(workflow_dispatch)으로만 실행되며, 참조 값은 현재 구조(main · compose/main.yml ·
# compose/worker.yml)에 맞춰 정리했다. 실제 운영 배포는 deploy/*.sh 스크립트를 사용한다.
name: Deploy Split Servers (legacy · manual only)

on:
  workflow_dispatch:

jobs:
  deploy-app:
    name: Deploy app server
    runs-on: ubuntu-latest

    steps:
      - name: Deploy app stack to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.APP_EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 10m
          script: |
            set -e
            DEPLOY_BRANCH="main"
            cd /home/ubuntu/apps/wooks-coding
            git fetch origin "$DEPLOY_BRANCH"
            git reset --hard "origin/$DEPLOY_BRANCH"
            test -f .env
            if grep -Eq '^POSTGRES_HOST=postgres$' .env; then
              echo "POSTGRES_HOST must point to the RDS endpoint in production."
              exit 1
            fi
            if docker compose -f compose/main.yml --project-directory . config --services | grep -Eq '^(postgres|worker)$'; then
              echo "App server compose must not run postgres or worker."
              docker compose -f compose/main.yml --project-directory . config --services
              exit 1
            fi
            docker compose -f compose/main.yml --project-directory . up --build -d --remove-orphans
            for i in $(seq 1 30); do
              if docker compose -f compose/main.yml --project-directory . exec -T django python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=5).read()"; then
                break
              fi
              if [ "$i" -eq 30 ]; then
                docker compose -f compose/main.yml --project-directory . logs --tail=100 django
                exit 1
              fi
              sleep 2
            done
            docker compose -f compose/main.yml --project-directory . ps
            curl -fsSI http://localhost/health/ >/dev/null

  deploy-worker:
    name: Deploy worker server
    runs-on: ubuntu-latest
    needs: deploy-app

    steps:
      - name: Deploy worker to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WORKER_EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 10m
          script: |
            set -e
            DEPLOY_BRANCH="main"
            cd /home/ubuntu/apps/wooks-coding
            git fetch origin "$DEPLOY_BRANCH"
            git reset --hard "origin/$DEPLOY_BRANCH"
            test -f .env
            if grep -Eq '^POSTGRES_HOST=postgres$' .env; then
              echo "POSTGRES_HOST must point to the RDS endpoint in production."
              exit 1
            fi
            if [ "$(docker compose -f compose/worker.yml --project-directory . config --services)" != "worker" ]; then
              echo "Worker server compose must run only worker."
              docker compose -f compose/worker.yml --project-directory . config --services
              exit 1
            fi
            docker compose -f compose/worker.yml --project-directory . up --build -d --remove-orphans
            docker compose -f compose/worker.yml --project-directory . ps
            docker compose -f compose/worker.yml --project-directory . logs --tail=80 worker
