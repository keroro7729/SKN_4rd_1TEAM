name: Deploy to EC2

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/apps/wooks-coding
            git fetch origin main
            git reset --hard origin/main
            test -f .env
            if grep -Eq '^POSTGRES_HOST=postgres$' .env; then
              echo "POSTGRES_HOST must point to the RDS endpoint in production."
              exit 1
            fi
            docker compose up --build -d --remove-orphans
            for i in $(seq 1 30); do
              if docker compose exec -T django python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=5).read()"; then
                break
              fi
              if [ "$i" -eq 30 ]; then
                docker compose logs --tail=100 django
                exit 1
              fi
              sleep 2
            done
            docker compose restart nginx
            docker compose ps
            docker compose exec -T django python manage.py check
            curl -fsSI http://localhost/health/ >/dev/null
