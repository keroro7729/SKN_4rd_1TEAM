{% extends "base.html" %}
{% block title %}내 노트에 물어보기 · WOOK'S CODING{% endblock %}

{% block content %}
<h1 class="page-title">내 노트에 물어보기</h1>
<p class="page-sub">본인 오답노트를 근거로 답합니다. (note_id / score 근거 표시 — RAG 연결은 STEP-06/07)</p>

<section class="panel">
  <textarea id="note-question" class="code-input" placeholder="예: 내가 자주 틀리는 그래프 탐색 실수는?"></textarea>
  <div class="editor-actions">
    <button id="note-ask-btn" type="button" class="btn" disabled>질문하기</button>
    <span class="hint-note">RAG 질의 연결은 STEP-06/07에서 구현됩니다.</span>
  </div>

  <!-- STEP-07 Fetch 대상 DOM -->
  <div id="note-answer" class="result-area" hidden></div>
  <div id="note-evidence" class="result-area" hidden></div>
</section>
{% endblock %}
