{% extends "base.html" %}
{% block title %}비밀번호 변경 - WOOK'S CODING{% endblock %}

{% block content %}
<div class="page-hero compact-hero">
  <div>
    <p class="eyebrow">Account</p>
    <h1 class="page-title">비밀번호 변경</h1>
    <p class="page-sub">현재 비밀번호와 새 비밀번호를 입력하세요.</p>
  </div>
</div>

<section class="panel auth-card">
  <form method="post" class="auth-form">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="editor-actions">
      <button type="submit" class="btn">변경하기</button>
      <a class="btn btn-ghost" href="{% url 'mypage:index' %}">취소</a>
    </div>
  </form>
</section>
{% endblock %}
