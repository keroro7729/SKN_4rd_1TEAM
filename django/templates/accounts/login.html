{% extends "base.html" %}

{% block title %}로그인 · WOOK'S CODING{% endblock %}

{% block content %}
<div class="auth-card">
  <h2 class="auth-title">로그인</h2>

  {% if form.errors %}
    <p class="auth-error">아이디 또는 비밀번호가 올바르지 않습니다.</p>
  {% endif %}

  <form method="post" class="auth-form">
    {% csrf_token %}
    <label for="id_username">아이디</label>
    <input type="text" name="username" id="id_username" placeholder="아이디" required autofocus>

    <label for="id_password">비밀번호</label>
    <input type="password" name="password" id="id_password" placeholder="비밀번호" required>

    <button type="submit" class="btn btn-block">로그인</button>
    <input type="hidden" name="next" value="{{ next }}">
  </form>

  <p class="auth-alt">계정이 없으신가요? <a href="{% url 'accounts:signup' %}">회원가입</a></p>
</div>
{% endblock %}
