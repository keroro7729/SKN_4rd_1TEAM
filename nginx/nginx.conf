# WOOK'S CODING - Nginx reverse proxy (STEP-09)
# 외부 요청 수신 -> Django(Gunicorn). FastAPI/Worker/DB는 내부 네트워크에서만 접근.

upstream django_upstream {
    server django:8000;   # docker-compose 서비스명:포트
}

server {
    listen 80;
    server_name _;

    client_max_body_size 5m;

    # 정적 파일: Django collectstatic 결과를 공유 볼륨으로 서빙
    location /static/ {
        alias /staticfiles/;
        access_log off;
        expires 7d;
    }

    # 그 외 모든 요청 -> Django (Gunicorn)
    location / {
        proxy_pass http://django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # 주의: FastAPI(/ai/*)는 외부로 직접 노출하지 않는다.
    #       Django가 내부 네트워크에서 http://fastapi:8001 로 호출한다.
}
